{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LifeOS</title>
    <script src="https://unpkg.io/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css">
    <style>
        /* Markdown styles */
        .markdown-body { max-width: none; border: none !important; background: transparent !important; padding: 0 !important; color: #1f2937 !important; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { color: #111827 !important; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.5rem; margin-top: 1.5rem; margin-bottom: 1rem; }
        .markdown-body pre { background: #1e1e2e; color: #cdd6f4; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; }
        .markdown-body code { background: #f3f4f6; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875rem; color: #1f2937; }
        .markdown-body pre code { background: none; padding: 0; color: #cdd6f4; }
        .markdown-body p, .markdown-body li { color: #374151 !important; line-height: 1.7; }
        .markdown-body ul { margin-left: 1.5rem; margin-bottom: 1rem; }
        
        /* HTMX Styling */
        
        /* Loading indicator - shows when request is in flight */
        .htmx-indicator {
            opacity: 0;
            transition: opacity 200ms ease-in-out;
        }
        .htmx-request .htmx-indicator,
        .htmx-indicator.htmx-request {
            opacity: 1;
        }
        
        /* Spinner animation */
        .htmx-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: htmx-spin 0.75s linear infinite;
        }
        
        @keyframes htmx-spin {
            to { transform: rotate(360deg); }
        }
        
        /* Request state styling */
        .htmx-request {
            pointer-events: none;
            opacity: 0.7;
        }
        
        /* Swap animations */
        .htmx-added {
            animation: htmx-fade-in 300ms ease-out;
        }
        
        @keyframes htmx-fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Error state */
        .htmx-error {
            animation: htmx-shake 0.5s ease-in-out;
            border-color: #ef4444 !important;
        }
        
        @keyframes htmx-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        /* Settling state (during swap) */
        .htmx-settling {
            opacity: 0.8;
        }
        
        /* Loading button state */
        .btn-loading {
            position: relative;
            color: transparent !important;
        }
        
        .btn-loading::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 1rem;
            height: 1rem;
            border: 2px solid #e5e7eb;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: htmx-spin 0.75s linear infinite;
        }
        
        /* Sidebar transition */
        .sidebar-link {
            transition: all 0.2s ease-in-out;
        }
        
        .sidebar-link:hover {
            background-color: #374151;
        }
        
        .sidebar-link.active {
            background-color: #3b82f6;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 text-white flex flex-col shadow-xl">
            <!-- Logo/Header -->
            <div class="p-6 border-b border-gray-800">
                <a href="/home" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-xl font-bold">
                        L
                    </div>
                    <span class="text-xl font-bold">LifeOS</span>
                </a>
            </div>
            
            <!-- Navigation -->
            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <a href="/home" 
                   class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:text-white"
                   hx-get="/home"
                   hx-target="#main-content"
                   hx-push-url="true">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    <span>Home</span>
                </a>
                
                <a href="/photos/view" 
                   class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:text-white"
                   hx-get="/photos/view"
                   hx-target="#main-content"
                   hx-push-url="true">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <span>Photos</span>
                </a>
                
                <a href="/skills" 
                   class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:text-white"
                   hx-get="/skills"
                   hx-target="#main-content"
                   hx-push-url="true">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                    </svg>
                    <span>Skills</span>
                </a>
            </nav>
            
            <!-- Footer -->
            <div class="p-4 border-t border-gray-800">
                <div class="flex items-center gap-3 px-4 py-2 text-sm text-gray-400">
                    <div class="htmx-indicator">
                        <div class="htmx-spinner"></div>
                    </div>
                    <span class="htmx-indicator">Loading...</span>
                </div>
            </div>
        </aside>
        
        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 overflow-y-auto">
            {{template "content" .}}
        </main>
    </div>
    
    <!-- HTMX Config -->
    <script>
        document.body.addEventListener('htmx:configRequest', function(evt) {
            // Add loading indicator to all requests
            evt.detail.headers['HX-Request'] = 'true';
        });
        
        document.body.addEventListener('htmx:beforeRequest', function(evt) {
            // Add loading state to clicked element
            const elt = evt.detail.elt;
            if (elt && elt.classList.contains('sidebar-link')) {
                elt.classList.add('htmx-request');
            }
        });
        
        document.body.addEventListener('htmx:afterRequest', function(evt) {
            // Remove loading state
            const elt = evt.detail.elt;
            if (elt && elt.classList.contains('sidebar-link')) {
                elt.classList.remove('htmx-request');
            }
        });
    </script>
</body>
</html>
{{end}}
