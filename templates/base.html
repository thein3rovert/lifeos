{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LifeOS</title>
    <script src="https://unpkg.io/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css">
    <style>
        .markdown-body { max-width: none; border: none !important; background: transparent !important; padding: 0 !important; color: #1f2937 !important; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { color: #111827 !important; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.5rem; margin-top: 1.5rem; margin-bottom: 1rem; }
        .markdown-body pre { background: #1e1e2e; color: #cdd6f4; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; }
        .markdown-body code { background: #f3f4f6; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875rem; color: #1f2937; }
        .markdown-body pre code { background: none; padding: 0; color: #cdd6f4; }
        .markdown-body p, .markdown-body li { color: #374151 !important; line-height: 1.7; }
        .markdown-body ul { margin-left: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/home">Home</a>
    </nav>
    <main>
        {{template "content" .}}
    </main>
</body>
</html>
{{end}}
