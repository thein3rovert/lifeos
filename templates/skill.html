{{template "base" .}}
{{define "content"}}
<div class="min-h-screen bg-gray-50 py-8 px-4">
  <div class="max-w-4xl mx-auto">
    <!-- Back button -->
    <a href="/skills" class="inline-flex items-center text-blue-500 hover:text-blue-600 mb-6">
      <span class="mr-2">←</span> Back to skills
    </a>

    <!-- Skill header -->
    <div class="bg-white rounded-xl shadow-md p-8 border border-gray-200 mb-6">
      <div class="flex items-center justify-between mb-4">
        <h1 class="text-3xl font-bold text-gray-800">{{.Title}}</h1>
        <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-sm">{{.Format}}</span>
      </div>
      <p class="text-sm text-gray-500">Last updated: {{.UpdatedAt}}</p>
    </div>

    <!-- Skill content -->
    <!--.HTMLContent contains the rendered html from
    goldmark-->
    <div class="bg-white rounded-xl shadow-md p-8 border border-gray-200">
      <article class="prose prose-lg max-w-none">
        {{.HTMLContent}}
      </article>
    </div>

    <!-- Edit button -->
    <div class="mt-6 flex gap-4">
      <a href="/skills/{{.ID}}/edit" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg transition-colors">
        Edit Skill
      </a>
      <a href="/skills/{{.ID}}/download" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-6 rounded-lg transition-colors">
        Download
      </a>
    </div>
  </div>
</div>
{{end}}
