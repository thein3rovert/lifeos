{{template "base" .}}
{{define "content"}}
<div class="min-h-screen bg-gray-50 py-12 px-4">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Upload a Photo</h1>
    
    <div class="bg-white rounded-xl shadow-md p-8 border border-gray-200">
      <form action="/photos/upload" method="POST" enctype="multipart/form-data" class="space-y-6">
        
        <!-- File Input -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Photo</label>
          <input type="file" name="photo" required 
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </div>
        
        <!-- Caption -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Caption</label>
          <input type="text" name="caption" placeholder="Enter a caption..."
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        
        <!-- Tags -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Tags</label>
          <input type="text" name="tags" placeholder="Tags (space-separated)" list="tag-list"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <datalist id="tag-list">
            {{range .}}
              <option value="{{.Name}}">
            {{end}}
          </datalist>
          <p class="text-xs text-gray-500 mt-1">Separate tags with spaces. Existing tags will show as suggestions.</p>
        </div>
        
        <!-- Submit Button -->
        <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-6 rounded-lg transition-colors shadow-md hover:shadow-lg">
          Upload Photo
        </button>
      </form>
    </div>
    
    <div class="text-center mt-6">
      <a href="/photos/view" class="text-blue-500 hover:text-blue-600 font-medium">← Back to gallery</a>
    </div>
  </div>
</div>
{{end}}
