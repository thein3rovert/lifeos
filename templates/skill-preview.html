{{define "content"}}
<div class="p-8 max-w-6xl mx-auto">
    <!-- Header -->
    <div class="mb-6">
        <a href="/skills/{{.ID}}" 
           class="inline-flex items-center text-blue-500 hover:text-blue-600 mb-4"
           hx-get="/skills/{{.ID}}"
           hx-target="#main-content"
           hx-push-url="true">
            <span class="mr-2">←</span> Back to skill
        </a>
        <h1 class="text-3xl font-bold text-gray-800">Preview AI Update: {{.Title}}</h1>
        <p class="text-gray-600 mt-2">Review and edit the AI-generated changes before saving</p>
    </div>

    <!-- Notes that were sent -->
    <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-3">Notes Sent to AI</h2>
        <ul class="list-disc list-inside space-y-1 text-gray-700">
            {{range .Notes}}
            <li>{{.Content}}</li>
            {{end}}
        </ul>
    </div>

    <!-- Editable markdown form -->
    <form action="/skills/save" method="POST" id="saveForm">
        <input type="hidden" name="skill_id" value="{{.ID}}">
        
        <!-- Editor -->
        <div class="bg-white rounded-xl shadow-md p-6 border border-gray-200 mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">Edit Skill Markdown</h2>
                <button type="button" onclick="updatePreview()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                    Update Preview
                </button>
            </div>
            <textarea 
                name="updated_content" 
                id="markdownEditor"
                rows="20" 
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm"
            >{{.UpdatedContent}}</textarea>
        </div>

        <!-- Live preview -->
        <div id="previewSection" class="bg-white rounded-xl shadow-md p-8 border border-gray-200 mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Preview</h2>
            <article class="markdown-body border-t pt-4" id="livePreview">
                {{.HTMLContent}}
            </article>
        </div>

        <!-- Actions -->
        <div class="flex gap-4">
            <button type="submit" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-6 rounded-lg transition-colors">
                ✓ Save to GitHub (Create PR)
            </button>
            <a href="/skills/{{.ID}}" 
               class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 px-6 rounded-lg transition-colors"
               hx-get="/skills/{{.ID}}"
               hx-target="#main-content"
               hx-push-url="true">
                ✕ Cancel
            </a>
        </div>
    </form>
</div>

<script>
function updatePreview() {
    const content = document.getElementById('markdownEditor').value;
    const previewSection = document.getElementById('livePreview');
    
    // Show loading state
    previewSection.innerHTML = '<p class="text-gray-500 italic">Rendering preview...</p>';
    
    // Send to server to render
    fetch('/skills/preview-render', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'content=' + encodeURIComponent(content)
    })
    .then(response => response.text())
    .then(html => {
        previewSection.innerHTML = html;
    })
    .catch(error => {
        previewSection.innerHTML = '<p class="text-red-500">Error rendering preview: ' + error.message + '</p>';
    });
}
</script>
{{end}}
