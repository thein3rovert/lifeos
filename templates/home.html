{{define "content"}}
<div class="p-8 max-w-6xl mx-auto">
  <!-- Header -->
  <div class="mb-10">
    <h1 class="text-4xl font-bold text-gray-800">Welcome back!</h1>
    <p class="text-gray-500 mt-2 text-lg">Manage your digital life with LifeOS</p>
  </div>
  
  <!-- Dashboard Cards -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Photos Card -->
    <a href="/photos/view" 
       class="group bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 p-8 border border-gray-200 hover:border-blue-300"
       hx-get="/photos/view"
       hx-target="#main-content"
       hx-push-url="true">
      <div class="flex items-start justify-between mb-4">
        <div class="p-4 bg-blue-50 rounded-xl group-hover:bg-blue-100 transition-colors">
          <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
        </div>
        <span class="htmx-indicator opacity-0 group-hover:opacity-100 transition-opacity">
          <div class="htmx-spinner border-blue-300 border-t-blue-600"></div>
        </span>
      </div>
      <h2 class="text-xl font-semibold text-gray-800 group-hover:text-blue-600 transition-colors">Photos</h2>
      <p class="text-gray-500 mt-2">Browse and manage your photo collection</p>
    </a>
    
    <!-- Skills Card -->
    <a href="/skills" 
       class="group bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 p-8 border border-gray-200 hover:border-purple-300"
       hx-get="/skills"
       hx-target="#main-content"
       hx-push-url="true">
      <div class="flex items-start justify-between mb-4">
        <div class="p-4 bg-purple-50 rounded-xl group-hover:bg-purple-100 transition-colors">
          <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
          </svg>
        </div>
        <span class="htmx-indicator opacity-0 group-hover:opacity-100 transition-opacity">
          <div class="htmx-spinner border-purple-300 border-t-purple-600"></div>
        </span>
      </div>
      <h2 class="text-xl font-semibold text-gray-800 group-hover:text-purple-600 transition-colors">Skills</h2>
      <p class="text-gray-500 mt-2">Manage AI agent skills and knowledge</p>
    </a>
  </div>
  
  <!-- Recent Activity Section -->
  <div class="mt-10">
    <h3 class="text-lg font-semibold text-gray-700 mb-4">Quick Stats</h3>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="text-center p-4 bg-gray-50 rounded-xl">
          <div class="text-3xl font-bold text-blue-600">--</div>
          <div class="text-gray-500 text-sm mt-1">Total Photos</div>
        </div>
        <div class="text-center p-4 bg-gray-50 rounded-xl">
          <div class="text-3xl font-bold text-purple-600">--</div>
          <div class="text-gray-500 text-sm mt-1">Skills Configured</div>
        </div>
        <div class="text-center p-4 bg-gray-50 rounded-xl">
          <div class="text-3xl font-bold text-green-600">Active</div>
          <div class="text-gray-500 text-sm mt-1">System Status</div>
        </div>
      </div>
    </div>
  </div>
</div>
{{end}}
