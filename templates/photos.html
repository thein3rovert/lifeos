{{template "base" .}}
{{define "content"}}
  <h1>Thein3rovert Photos</h1>
  <div>
    {{range .}}
      <div>
        <img src="/static/{{.Path}}" alt="{{.Caption}}">
        <!--<p>{{.Filename}}</p>-->
        <p>{{.Caption}}</p>
        <p>{{.CreatedAt}}</p>
      </div>
    {{else}}
      <p>No photos yet.</p>
    {{end}}
  </div>
  <div>
    <a href="/photos/upload">Click here to upload new photos</a>
  </div>
{{end}}
