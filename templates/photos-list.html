<div id="photo-results" class="photo-grid">
{{range .Photos}}
  <div class="photo-card">
    <img src="/static/{{.Path}}" alt="{{.Caption}}">
    <p>{{.Caption}}</p>
    {{if .Tags}}
      <p class="photo-tags">{{range .Tags}}<span class="tag">{{.Name}}</span> {{end}}</p>
    {{end}}
  </div>
{{else}}
  {{if .SearchQuery}}
    <p>No photos found for "{{.SearchQuery}}".</p>
  {{else}}
    <p>No photos yet.</p>
  {{end}}
{{end}}
</div>
